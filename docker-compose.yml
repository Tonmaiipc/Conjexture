# docker-compose.yml
# ContextPool POC Stack — Letta + mem0 + Qdrant

services:

  letta:
    build:
      context: .
      dockerfile: Dockerfile.letta
    image: ctxpool-letta:latest
    container_name: ctxpool-letta
    ports:
      - "8283:8283"
    environment:
      - LETTA_PG_URI=${LETTA_DB_URI:-postgresql://letta:letta@letta-db:5432/letta}
      - LETTA_ALLOW_PRIVATE_IP=${LETTA_ALLOW_PRIVATE_IP:-false}
      # Cloud
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # Local
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - SECURE=${SECURE:-false}
      - LETTA_SERVER_PASSWORD=${LETTA_SERVER_PASSWORD:-}
      - LETTA_BASE_URL=${LETTA_BASE_URL:-http://localhost:8283}
      # mounted tools' dir
      - TOOL_EXEC_DIR=/app/tools
      # env var for mem0
      - MEM0_LLM_MODEL=${MEM0_LLM_MODEL}
      - MEM0_LLM_BASE_URL=${MEM0_LLM_BASE_URL}
      - MEM0_EMBEDDING_MODEL=${MEM0_EMBEDDING_MODEL}
      - MEM0_EMBEDDING_BASE_URL=${MEM0_EMBEDDING_BASE_URL}
      - MEM0_ORG_ID=${MEM0_ORG_ID}
      - MEM0_LLM_API_KEY=${MEM0_LLM_API_KEY}
      # other tools config
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT=${QDRANT_PORT}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
    volumes:
      - letta-data:/root/.letta
      - ./tools:/app/tools
    depends_on:
      letta-db:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  letta-db:
    image: pgvector/pgvector:pg16
    container_name: ctxpool-letta-db
    environment:
      - POSTGRES_USER=${LETTA_DB_USERNAME:-letta}
      - POSTGRES_PASSWORD=${LETTA_DB_PASSWORD:-letta}
      - POSTGRES_DB=${LETTA_DB_NAME:-letta}
    volumes:
      - letta-db-data:/var/lib/postgresql/data
      - ./init/letta-db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letta -d letta"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ctxpool-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  mem0-db:
    image: pgvector/pgvector:pg16
    container_name: ctxpool-mem0-db
    environment:
      - POSTGRES_USER=${MEM0_DB_USERNAME:-mem0}
      - POSTGRES_PASSWORD=${MEM0_DB_PASSWORD:-mem0}
      - POSTGRES_DB=${MEM0_DB_NAME:-mem0}
    volumes:
      - mem0-db-data:/var/lib/postgresql/data
      - ./init/mem0-db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0 -d mem0"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  searxng:
    image: searxng/searxng
    container_name: ctxpool-searxng
    profiles:
      - search
    ports:
      - "8080:8080"
    volumes:
      - ${SEARXNG_CONFIG_PATH:-./searxng-config}:/etc/searxng
    restart: unless-stopped

  slack-mcp:
    image: ghcr.io/korotovsky/slack-mcp-server:latest
    container_name: ctxpool-slack-mcp
    profiles:
      - slack
    ports:
      - "3001:3001"
    environment:
      - SLACK_MCP_XOXB_TOKEN=${SLACK_MCP_XOXB_TOKEN}
      - SLACK_MCP_XOXP_TOKEN=${SLACK_MCP_XOXP_TOKEN}
      - SLACK_MCP_HOST=0.0.0.0
      - SLACK_MCP_PORT=3001
      - SLACK_MCP_API_KEY=${SLACK_MCP_API_KEY}
    command: ["-t", "http"]
    restart: unless-stopped

volumes:
  letta-data:
  letta-db-data:
  mem0-db-data:
  qdrant-data: