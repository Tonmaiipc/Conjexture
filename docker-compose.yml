# docker-compose.yml
# Conjexture Stack — Letta + mem0 + Qdrant

services:

  letta:
    build:
      context: .
      dockerfile: Dockerfile.letta
    image: conjexture-letta:latest
    container_name: letta
    ports:
      - "8283:8283"
    environment:
      - LETTA_PG_URI=${LETTA_DB_URI:-postgresql://letta:letta@letta-db:5432/letta}
      - LETTA_ALLOW_PRIVATE_IP=${LETTA_ALLOW_PRIVATE_IP:-false}
      # Cloud
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # Local
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - SECURE=${SECURE:-false}
      - LETTA_SERVER_PASSWORD=${LETTA_SERVER_PASSWORD:-}
      - LETTA_BASE_URL=${LETTA_BASE_URL:-http://localhost:8283}
      # mounted tools' dir
      - TOOL_EXEC_DIR=/app/tools
      # env var for mem0
      - MEM0_LLM_MODEL=${MEM0_LLM_MODEL:-}
      - MEM0_LLM_BASE_URL=${MEM0_LLM_BASE_URL:-}
      - MEM0_EMBEDDING_MODEL=${MEM0_EMBEDDING_MODEL:-}
      - MEM0_EMBEDDING_BASE_URL=${MEM0_EMBEDDING_BASE_URL:-}
      - MEM0_ORG_ID=${MEM0_ORG_ID:-}
      - MEM0_LLM_API_KEY=${MEM0_LLM_API_KEY:-}
      - MEM0_DB_URI=${MEM0_DB_URI:-}
      # other tools config
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT=${QDRANT_PORT}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - SLACK_MCP_XOXP_TOKEN=${SLACK_MCP_XOXP_TOKEN}
    volumes:
      - letta-data:/root/.letta
    depends_on:
      letta-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8283/v1/agents', timeout=5); sys.exit(0 if r.status == 200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  letta-db:
    image: pgvector/pgvector:pg16
    container_name: letta-db
    environment:
      - POSTGRES_USER=${LETTA_DB_USERNAME:-letta}
      - POSTGRES_PASSWORD=${LETTA_DB_PASSWORD:-letta}
      - POSTGRES_DB=${LETTA_DB_NAME:-letta}
    volumes:
      - letta-db-data:/var/lib/postgresql/data
      - ./init/letta-db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letta -d letta"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  mem0-db:
    image: pgvector/pgvector:pg16
    container_name: mem0-db
    environment:
      - POSTGRES_USER=${MEM0_DB_USERNAME:-mem0}
      - POSTGRES_PASSWORD=${MEM0_DB_PASSWORD:-mem0}
      - POSTGRES_DB=${MEM0_DB_NAME:-mem0}
    volumes:
      - mem0-db-data:/var/lib/postgresql/data
      - ./init/mem0-db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0 -d mem0"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  searxng:
    image: searxng/searxng
    container_name: searxng
    profiles:
      - search
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      - ${SEARXNG_CONFIG_PATH:-./searxng-config}:/etc/searxng
    restart: unless-stopped

  slack-mcp:
    image: ghcr.io/korotovsky/slack-mcp-server:latest
    container_name: slack-mcp
    profiles:
      - slack
    ports:
      - "3001:3001"
    environment:
      - SLACK_MCP_XOXB_TOKEN=${SLACK_MCP_XOXB_TOKEN}
      - SLACK_MCP_XOXP_TOKEN=${SLACK_MCP_XOXP_TOKEN}
      - SLACK_MCP_HOST=0.0.0.0
      - SLACK_MCP_PORT=3001
      - SLACK_MCP_API_KEY=${SLACK_MCP_API_KEY}
    command: ["-t", "http"]
    restart: unless-stopped

  atlassian-mcp:
    image: ghcr.io/sooperset/mcp-atlassian:latest
    container_name: atlassian-mcp
    profiles:
      - jira
    ports:
      - "3002:3002"
    environment:
      # - ATLASSIAN_OAUTH_ENABLE=true
      # - ATLASSIAN_OAUTH_CLIENT_ID=${ATLASSIAN_OAUTH_CLIENT_ID}
      # - ATLASSIAN_OAUTH_CLIENT_SECRET=${ATLASSIAN_OAUTH_CLIENT_SECRET}
      # - ATLASSIAN_OAUTH_REDIRECT_URI=http://localhost:8080/callback
      # - ATLASSIAN_OAUTH_CLOUD_ID=e7d89018-3348-48b7-82eb-0c81515b23e3
      # - ATLASSIAN_OAUTH_SCOPE=read:issue:jira read:issue-meta:jira read:comment:jira read:field:jira read:priority:jira read:issue-details:jira read:issue-type:jira read:issue-worklog:jira read:issue-status:jira read:issue.changelog:jira read:user:jira read:label:jira read:project:jira read:project.feature:jira read:issue.time-tracking:jira read:workflow:jira read:epic:jira-software read:issue:jira-software read:sprint:jira-software read:content:confluence read:content-details:confluence read:space-details:confluence read:page:confluence read:attachment:confluence read:comment:confluence read:space:confluence read:confluence-space.summary read:confluence-content.all read:confluence-content.summary search:confluence read:jira-work offline_access
      # - JIRA_URL=https://pavarit-ch.atlassian.net
      # - CONFLUENCE_URL=https://pavarit-ch.atlassian.net/wiki
      - JIRA_URL=https://api.atlassian.com/ex/jira/e7d89018-3348-48b7-82eb-0c81515b23e3
      - JIRA_USERNAME=${ATLASSIAN_USERNAME}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - CONFLUENCE_URL=https://api.atlassian.com/ex/confluence/e7d89018-3348-48b7-82eb-0c81515b23e3
      - CONFLUENCE_USERNAME=${ATLASSIAN_USERNAME}
      - CONFLUENCE_API_TOKEN=${CONFLUENCE_API_TOKEN}
    volumes:
      - ./.mcp-atlassian:/home/app/.mcp-atlassian
    command: ["--transport", "streamable-http", "--port", "3002"]
    restart: unless-stopped

  conjexture-mcp:
    build:
      context: ./mcp-in
      dockerfile: Dockerfile
    image: conjexture-mcp:latest
    container_name: conjexture-mcp
    ports:
      - "8300:8300"
    environment:
      - LETTA_URL=http://letta:8283
      - LETTA_PASSWORD=${LETTA_SERVER_PASSWORD}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8300
      - DISABLE_DNS_REBINDING_PROTECTION=${DISABLE_DNS_REBINDING_PROTECTION:-false}
    depends_on:
      letta:
        condition: service_healthy
    restart: unless-stopped


volumes:
  letta-data:
  letta-db-data:
  mem0-db-data:
  qdrant-data:
